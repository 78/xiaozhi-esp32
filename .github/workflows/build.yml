name: Build Taijipai Boards

on:
  push:
    tags:
      - "*" # auto build on tag push
  workflow_dispatch: # allow manual trigger

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.full_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - board: taiji-pi-s3
            name: taiji-pi-s3
            full_name: taiji-pi-s3
          - board: taiji-pi-s3
            name: taiji-pi-s3-pdm
            full_name: taiji-pi-s3-pdm
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build taijipai variant
        shell: bash
        run: |
          source $IDF_PATH/export.sh
          python scripts/release.py ${{ matrix.board }} --name ${{ matrix.name }}
          mkdir -p dist
          cp build/merged-binary.bin dist/xiaozhi_${{ matrix.full_name }}.bin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xiaozhi_${{ matrix.full_name }}_${{ github.sha }}
          path: dist/xiaozhi_${{ matrix.full_name }}.bin
          if-no-files-found: error

  release:
    name: Upload artifacts to release
    needs: [build]
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: xiaozhi_*_${{ github.sha }}
          path: dist
          merge-multiple: true

      - name: Upload binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*.bin
          fail_on_unmatched_files: true
