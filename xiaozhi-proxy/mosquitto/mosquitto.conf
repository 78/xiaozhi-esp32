# Mosquitto MQTT Broker configuration for XiaoZhi Proxy

# --- Listener ---
# Plain MQTT on port 1883 (for development)
listener 1883
protocol mqtt

# TLS MQTT on port 8883 (for production, uncomment and configure certs)
# listener 8883
# protocol mqtt
# cafile mosquitto/certs/ca.crt
# certfile mosquitto/certs/server.crt
# keyfile mosquitto/certs/server.key
# tls_version tlsv1.2

# --- Authentication ---
allow_anonymous false
password_file mosquitto/passwd

# --- Logging ---
log_type all
log_dest stderr
